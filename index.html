<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Local Narrator</title>
    <!-- Tailwind CSS for a clean, minimalist UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <!-- PDF.js for reading PDFs locally without a server -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        html { @apply dark; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans flex items-center justify-center min-h-screen p-4 dark">

    <div class="bg-slate-900 p-8 rounded-2xl shadow-sm border border-slate-700 max-w-lg w-full">
        <h1 class="text-3xl font-bold mb-1 text-center text-slate-100">Local Narrator</h1>

        <!-- Homepage Upload Section -->
        <div class="border-2 border-dashed border-slate-600 rounded-xl p-8 text-center hover:bg-slate-800 transition">
            <input type="file" id="pdf-upload" accept="application/pdf" class="hidden">
            <label for="pdf-upload" class="cursor-pointer text-blue-400 font-semibold text-lg block mb-1">
                Click to upload a PDF book
            </label>
            <p class="text-xs text-slate-400 mt-2" id="file-name">Your file never leaves this device.</p>
        </div>

        <!-- Audio Controls -->
        <div class="mt-8">
            <div class="flex justify-center space-x-2 mb-4 flex-wrap gap-2">
                <button id="play-btn" class="bg-blue-600 text-white px-6 py-2 rounded-full font-medium hover:bg-blue-700 transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                    ▶ Play
                </button>
                <button id="pause-btn" class="bg-slate-700 text-slate-100 px-6 py-2 rounded-full font-medium hover:bg-slate-600 transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                    ⏸ Pause
                </button>
                <button id="stop-btn" class="bg-red-900 text-red-400 px-6 py-2 rounded-full font-medium hover:bg-red-800 transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                    ⏹ Stop
                </button>
            </div>
            <div class="flex justify-center space-x-2 flex-wrap gap-2">
                <button id="rewind-30-btn" class="bg-slate-700 text-slate-100 px-4 py-2 rounded-full text-sm font-medium hover:bg-slate-600 transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                    ⏮ -30s
                </button>
                <button id="rewind-10-btn" class="bg-slate-700 text-slate-100 px-4 py-2 rounded-full text-sm font-medium hover:bg-slate-600 transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                    ⏪ -10s
                </button>
                <button id="forward-10-btn" class="bg-slate-700 text-slate-100 px-4 py-2 rounded-full text-sm font-medium hover:bg-slate-600 transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                    ⏩ +10s
                </button>
                <button id="forward-30-btn" class="bg-slate-700 text-slate-100 px-4 py-2 rounded-full text-sm font-medium hover:bg-slate-600 transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                    ⏭ +30s
                </button>
            </div>
            <div class="flex justify-center space-x-2 flex-wrap gap-2 mt-3">
                <button data-rate="1" class="rate-btn bg-blue-600 text-white px-4 py-2 rounded-full text-sm font-medium hover:bg-blue-700 transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                    1.0x
                </button>
                <button data-rate="1.5" class="rate-btn bg-slate-700 text-slate-100 px-4 py-2 rounded-full text-sm font-medium hover:bg-slate-600 transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                    1.5x
                </button>
                <button data-rate="1.75" class="rate-btn bg-slate-700 text-slate-100 px-4 py-2 rounded-full text-sm font-medium hover:bg-slate-600 transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                    1.75x
                </button>
                <button data-rate="2" class="rate-btn bg-slate-700 text-slate-100 px-4 py-2 rounded-full text-sm font-medium hover:bg-slate-600 transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                    2.0x
                </button>
            </div>
            <div class="flex justify-center mt-3">
                <p class="text-sm text-slate-400 font-mono" id="time-display">00:00:00 / 00:00:00</p>
            </div>
            <div class="mt-3">
                <input id="seek-slider" type="range" min="0" max="100" value="0" class="w-full h-2 rounded-lg bg-slate-800 accent-blue-500" disabled>
            </div>
        </div>
        <p class="text-xs text-amber-400 text-center mt-4" id="status-message">
            Tip: for fewer browser restrictions, open this file via a local server (e.g., http://localhost:3000) instead of file://
        </p>
    </div>

    <script>
        const uploadInput = document.getElementById("pdf-upload");
        const fileNameDisplay = document.getElementById("file-name");
        const playBtn = document.getElementById("play-btn");
        const pauseBtn = document.getElementById("pause-btn");
        const stopBtn = document.getElementById("stop-btn");
        const rewind30Btn = document.getElementById("rewind-30-btn");
        const rewind10Btn = document.getElementById("rewind-10-btn");
        const forward10Btn = document.getElementById("forward-10-btn");
        const forward30Btn = document.getElementById("forward-30-btn");
        const timeDisplay = document.getElementById("time-display");
        const seekSlider = document.getElementById("seek-slider");
        const rateButtons = document.querySelectorAll(".rate-btn");
        const statusMessage = document.getElementById("status-message");

        const CHUNK_SIZE = 1800;
        const CHUNK_FLEX = 200;

        const synth = window.speechSynthesis;
        let voicesReady = false;
        let fullText = "";
        let chunks = [];
        let chunkStarts = [];
        let chunkIndex = 0;
        let currentUtterance = null;
        let selectedRate = 1.0;
        let currentCharIndex = 0;
        let isPlaying = false;
        let isPaused = false;
        let isStopping = false;
        let updateInterval = null;
        let estimatedTotalSeconds = 0;
        let charsPerSecond = getCharsPerSecond(selectedRate);
        let lastUpdateTime = 0;

        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

        warmupVoices();

        function setStatus(message, type = "info") {
            statusMessage.textContent = message;
            statusMessage.classList.remove("text-amber-400", "text-red-400", "text-emerald-400");
            if (type === "error") statusMessage.classList.add("text-red-400");
            else if (type === "success") statusMessage.classList.add("text-emerald-400");
            else statusMessage.classList.add("text-amber-400");
        }

        function warmupVoices() {
            // Trigger voice loading early; some browsers need getVoices called.
            const tryVoices = () => {
                const voices = synth.getVoices();
                if (voices && voices.length) {
                    voicesReady = true;
                    if (fullText) playBtn.disabled = false;
                    setStatus("Voices ready. You can play the narration.");
                    synth.removeEventListener("voiceschanged", tryVoices);
                }
            };
            tryVoices();
            synth.addEventListener("voiceschanged", tryVoices);
            // Fallback message after short delay if still no voices.
            setTimeout(() => {
                if (!voicesReady) {
                    setStatus("No speech voices detected. Enable system TTS and reload, or open via localhost.", "error");
                }
            }, 1500);
        }

        function formatDuration(seconds) {
            const totalSeconds = Math.max(0, Math.floor(seconds));
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const secs = totalSeconds % 60;
            return `${hours.toString().padStart(2, "0")}:${minutes.toString().padStart(2, "0")}:${secs.toString().padStart(2, "0")}`;
        }

        function getCharsPerSecond(rate = 1.0) {
            const WPM = 150;
            const CHARS_PER_WORD = 5;
            return (WPM * CHARS_PER_WORD * rate) / 60;
        }

        function estimateTotalDuration(rateMultiplier = selectedRate) {
            const rate = getCharsPerSecond(rateMultiplier);
            return rate ? fullText.length / rate : 0;
        }

        function chunkText(text) {
            const result = [];
            const starts = [];
            let cursor = 0;
            const len = text.length;
            while (cursor < len) {
                const windowEnd = Math.min(cursor + CHUNK_SIZE + CHUNK_FLEX, len);
                const windowText = text.slice(cursor, windowEnd);
                let breakPos = -1;

                // Prefer sentence boundaries near the target size.
                const targetWindow = windowText.slice(0, Math.min(windowText.length, CHUNK_SIZE + CHUNK_FLEX));
                const candidates = [". ", "! ", "? ", "\n"];
                for (const sep of candidates) {
                    const idx = targetWindow.lastIndexOf(sep, CHUNK_SIZE);
                    if (idx > breakPos) breakPos = idx + sep.length;
                }

                if (breakPos <= 0) {
                    breakPos = Math.min(CHUNK_SIZE, windowText.length);
                }

                starts.push(cursor);
                result.push(windowText.slice(0, breakPos));
                cursor += breakPos;
            }
            return { result, starts };
        }

        function updatePlaybackProgress() {
            if (!isPlaying || isPaused) return;
            const now = Date.now();
            if (!lastUpdateTime) {
                lastUpdateTime = now;
                return;
            }
            const deltaSeconds = (now - lastUpdateTime) / 1000;
            if (deltaSeconds > 0) {
                currentCharIndex = Math.min(fullText.length, currentCharIndex + deltaSeconds * charsPerSecond);
            }
            lastUpdateTime = now;
        }

        function updateTimeDisplay() {
            updatePlaybackProgress();
            const totalSeconds = estimateTotalDuration(selectedRate);
            const displayElapsed = charsPerSecond ? currentCharIndex / charsPerSecond : 0;
            timeDisplay.textContent = `${formatDuration(displayElapsed)} / ${formatDuration(totalSeconds)}`;

            if (fullText.length) {
                const percent = (currentCharIndex / fullText.length) * 100;
                seekSlider.value = percent;
            } else {
                seekSlider.value = 0;
            }
        }

        function updateSkipButtonStates() {
            const canSkip = isPlaying || isPaused;
            rewind30Btn.disabled = !canSkip;
            rewind10Btn.disabled = !canSkip;
            forward10Btn.disabled = !canSkip;
            forward30Btn.disabled = !canSkip;
        }

        function goToGlobalIndex(index, autoPlay) {
            if (!fullText.length) return;
            const clamped = Math.max(0, Math.min(index, fullText.length));
            let targetChunk = chunks.length - 1;
            for (let i = 0; i < chunkStarts.length; i++) {
                const start = chunkStarts[i];
                const end = start + chunks[i].length;
                if (clamped >= start && clamped < end) {
                    targetChunk = i;
                    break;
                }
            }
            chunkIndex = targetChunk;
            const chunkStart = chunkStarts[targetChunk];
            const offset = clamped - chunkStart;
            currentCharIndex = clamped;
            lastUpdateTime = 0;

            synth.cancel();
            clearInterval(updateInterval);
            updateInterval = null;

            isPlaying = false;
            isPaused = !autoPlay;

            if (autoPlay) {
                speakNextChunk(offset);
            } else {
                pauseBtn.disabled = true;
                updateSkipButtonStates();
                updateTimeDisplay();
            }
        }

        function speakNextChunk(startOffset = 0) {
            if (!chunks.length) return;
            if (chunkIndex >= chunks.length) {
                finishPlayback();
                return;
            }

            const chunkTextContent = chunks[chunkIndex].slice(startOffset);
            currentCharIndex = chunkStarts[chunkIndex] + startOffset;

            currentUtterance = new SpeechSynthesisUtterance(chunkTextContent);
            currentUtterance.rate = selectedRate;
            charsPerSecond = getCharsPerSecond(selectedRate);

            currentUtterance.onstart = () => {
                isPlaying = true;
                isPaused = false;
                lastUpdateTime = Date.now();
                if (!updateInterval) updateInterval = setInterval(updateTimeDisplay, 100);
                pauseBtn.disabled = false;
                updateSkipButtonStates();
            };

            currentUtterance.onend = () => {
                if (isStopping) return;
                currentCharIndex = chunkStarts[chunkIndex] + chunks[chunkIndex].length;
                chunkIndex += 1;
                if (chunkIndex < chunks.length) {
                    speakNextChunk(0);
                } else {
                    finishPlayback();
                }
            };

            currentUtterance.onpause = () => {
                updatePlaybackProgress();
                isPaused = true;
                isPlaying = false;
                lastUpdateTime = 0;
                clearInterval(updateInterval);
                updateInterval = null;
                updateSkipButtonStates();
            };

            currentUtterance.onresume = () => {
                isPaused = false;
                isPlaying = true;
                lastUpdateTime = Date.now();
                if (!updateInterval) updateInterval = setInterval(updateTimeDisplay, 100);
                updateSkipButtonStates();
            };

            currentUtterance.onerror = (e) => {
                setStatus(`Speech error: ${e.error || "unknown error"}`, "error");
                finishPlayback();
            };

            synth.speak(currentUtterance);
        }

        function finishPlayback() {
            isPlaying = false;
            isPaused = false;
            chunkIndex = chunks.length;
            currentCharIndex = fullText.length;
            lastUpdateTime = 0;
            clearInterval(updateInterval);
            updateInterval = null;
            pauseBtn.disabled = true;
            updateSkipButtonStates();
            updateTimeDisplay();
        }

        function seekBySeconds(skipSeconds) {
            if (!isPlaying && !isPaused) return;
            updatePlaybackProgress();
            const rateChars = getCharsPerSecond(selectedRate);
            const newIndex = currentCharIndex + skipSeconds * rateChars;
            goToGlobalIndex(newIndex, isPlaying);
        }

        function seekToPercent(percent) {
            if (!fullText.length) return;
            const clamped = Math.max(0, Math.min(100, percent));
            const newIndex = (clamped / 100) * fullText.length;
            goToGlobalIndex(newIndex, isPlaying);
        }

        uploadInput.addEventListener("change", async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            fileNameDisplay.textContent = file.name;
            playBtn.disabled = true;

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                fullText = "";

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(" ");
                    fullText += pageText + " \n";
                }

                const { result, starts } = chunkText(fullText);
                chunks = result;
                chunkStarts = starts;
                chunkIndex = 0;
                currentCharIndex = 0;
                selectedRate = 1.0;
                charsPerSecond = getCharsPerSecond(selectedRate);
                estimatedTotalSeconds = estimateTotalDuration();
                lastUpdateTime = 0;
                isPlaying = false;
                isPaused = false;
                setActiveRateButton(selectedRate);
                timeDisplay.textContent = `00:00:00 / ${formatDuration(estimatedTotalSeconds)}`;
                seekSlider.value = 0;
                seekSlider.disabled = false;
                stopBtn.disabled = false;
                rateButtons.forEach(btn => btn.disabled = false);
                updateSkipButtonStates();
                if (voicesReady) {
                    playBtn.disabled = false;
                } else {
                    setStatus("Waiting for speech voices before enabling Play...", "info");
                }
            } catch (error) {
                console.error("Error reading PDF:", error.message);
                setStatus("Failed to read PDF. Try another file or open via localhost.", "error");
            }
        });

        playBtn.addEventListener("click", () => {
            if (!voicesReady) {
                setStatus("Speech voices not ready. Enable TTS and reload.", "error");
                return;
            }
            if (!fullText.length) return;

            if (synth.paused && currentUtterance) {
                synth.resume();
                return;
            }

            if (!isPlaying) {
                isStopping = false;
                speakNextChunk(currentCharIndex - (chunkStarts[chunkIndex] || 0));
            }
        });

        pauseBtn.addEventListener("click", () => {
            if (synth.speaking && !synth.paused) {
                updatePlaybackProgress();
                synth.pause();
            }
        });

        stopBtn.addEventListener("click", () => {
            isStopping = true;
            synth.cancel();
            isPlaying = false;
            isPaused = false;
            chunkIndex = 0;
            currentCharIndex = 0;
            charsPerSecond = getCharsPerSecond(selectedRate);
            lastUpdateTime = 0;
            clearInterval(updateInterval);
            updateInterval = null;
            estimatedTotalSeconds = estimateTotalDuration(selectedRate);
            timeDisplay.textContent = `00:00:00 / ${formatDuration(estimatedTotalSeconds)}`;
            seekSlider.value = 0;
            seekSlider.disabled = true;
            pauseBtn.disabled = true;
            updateSkipButtonStates();
            setStatus("Playback stopped.");
            setTimeout(() => { isStopping = false; }, 0);
        });

        forward10Btn.addEventListener("click", () => seekBySeconds(10));
        forward30Btn.addEventListener("click", () => seekBySeconds(30));
        rewind10Btn.addEventListener("click", () => seekBySeconds(-10));
        rewind30Btn.addEventListener("click", () => seekBySeconds(-30));
        seekSlider.addEventListener("input", (e) => seekToPercent(Number(e.target.value)));

        function setActiveRateButton(rate) {
            rateButtons.forEach((btn) => {
                const btnRate = Number(btn.dataset.rate);
                if (btnRate === Number(rate)) {
                    btn.classList.remove("bg-slate-700", "text-slate-100", "hover:bg-slate-600");
                    btn.classList.add("bg-blue-600", "text-white", "hover:bg-blue-700");
                } else {
                    btn.classList.remove("bg-blue-600", "text-white", "hover:bg-blue-700");
                    btn.classList.add("bg-slate-700", "text-slate-100", "hover:bg-slate-600");
                }
            });
        }

        rateButtons.forEach((btn) => {
            btn.addEventListener("click", () => {
                const rate = Number(btn.dataset.rate);
                selectedRate = rate;
                charsPerSecond = getCharsPerSecond(selectedRate);
                estimatedTotalSeconds = estimateTotalDuration(selectedRate);
                setActiveRateButton(rate);

                if (isPlaying || isPaused) {
                    updatePlaybackProgress();
                    const newIndex = currentCharIndex;
                    goToGlobalIndex(newIndex, isPlaying);
                }

                updateTimeDisplay();
            });
        });
    </script>
</body>
</html>
