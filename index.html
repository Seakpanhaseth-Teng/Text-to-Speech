<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Local Narrator</title>
    <!-- Tailwind CSS for a clean, minimalist UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF.js for reading PDFs locally without a server -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 max-w-lg w-full">
        <h1 class="text-3xl font-bold mb-1 text-center text-slate-800">Local Narrator</h1>

        <!-- Homepage Upload Section -->
        <div class="border-2 border-dashed border-slate-300 rounded-xl p-8 text-center hover:bg-slate-50 transition">
            <input type="file" id="pdf-upload" accept="application/pdf" class="hidden">
            <label for="pdf-upload" class="cursor-pointer text-blue-600 font-semibold text-lg block mb-1">
                Click to upload a PDF book
            </label>
            <p class="text-xs text-slate-400 mt-2" id="file-name">Your file never leaves this device.</p>
        </div>

        <!-- Audio Controls -->
        <div class="mt-8">
            <div class="flex justify-center space-x-2 mb-4 flex-wrap gap-2">
                <button id="play-btn" class="bg-blue-600 text-white px-6 py-2 rounded-full font-medium hover:bg-blue-700 transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                    ▶ Play
                </button>
                <button id="pause-btn" class="bg-slate-100 text-slate-800 px-6 py-2 rounded-full font-medium hover:bg-slate-200 transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                    ⏸ Pause
                </button>
                <button id="stop-btn" class="bg-red-50 text-red-600 px-6 py-2 rounded-full font-medium hover:bg-red-100 transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                    ⏹ Stop
                </button>
            </div>
            <div class="flex justify-center space-x-2 flex-wrap gap-2">
                <button id="rewind-30-btn" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-full text-sm font-medium hover:bg-slate-300 transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                    ⏮ -30s
                </button>
                <button id="rewind-10-btn" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-full text-sm font-medium hover:bg-slate-300 transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                    ⏪ -10s
                </button>
                <button id="forward-10-btn" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-full text-sm font-medium hover:bg-slate-300 transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                    ⏩ +10s
                </button>
                <button id="forward-30-btn" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-full text-sm font-medium hover:bg-slate-300 transition disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                    ⏭ +30s
                </button>
            </div>
            <div class="flex justify-center mt-3">
                <p class="text-sm text-slate-600 font-mono" id="time-display">00:00 / 00:00</p>
            </div>
        </div>

        <!-- Text Preview & Status -->
        <div class="mt-8">
            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Status & Preview</p>
            <div class="text-sm text-slate-600 bg-slate-50 p-4 rounded-xl h-40 overflow-y-auto border border-slate-100" id="status-box">
                Waiting for a book...
            </div>
        </div>
    </div>

    <script>
        const uploadInput = document.getElementById('pdf-upload');
        const fileNameDisplay = document.getElementById('file-name');
        const statusBox = document.getElementById('status-box');
        const playBtn = document.getElementById('play-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const stopBtn = document.getElementById('stop-btn');
        const rewind30Btn = document.getElementById('rewind-30-btn');
        const rewind10Btn = document.getElementById('rewind-10-btn');
        const forward10Btn = document.getElementById('forward-10-btn');
        const forward30Btn = document.getElementById('forward-30-btn');
        const timeDisplay = document.getElementById('time-display');

        let fullText = "";
        let synth = window.speechSynthesis;
        let utterance = null;
        
        // Time tracking variables
        let startTime = 0;
        let currentCharIndex = 0; // Absolute position in full text
        let elapsedSeconds = 0;
        let isPlaying = false;
        let isPaused = false;
        let updateInterval = null;
        let estimatedTotalSeconds = 0;

        // Initialize the local PDF worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // Helper function: Format seconds to MM:SS
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Helper function: Calculate characters per second based on speech rate
        // Baseline: ~150 words per minute at 1.0 rate, ~5 chars per word average
        function getCharsPerSecond(utteranceRate = 1.0) {
            const WPM = 150;
            const CHARS_PER_WORD = 5;
            const charsPerMinute = WPM * CHARS_PER_WORD * utteranceRate;
            return charsPerMinute / 60;
        }

        // Helper function: Estimate total duration in seconds
        function estimateTotalDuration() {
            const charsPerSecond = getCharsPerSecond(1.0); // Use default rate for estimation
            return fullText.length / charsPerSecond;
        }

        // Helper function: Seek to a new position by skipping/rewinding
        function seekBySeconds(skipSeconds) {
            if (!isPlaying && !isPaused) return;

            // Pause current utterance
            synth.pause();

            // Calculate new character index
            const charsPerSecond = getCharsPerSecond(utterance?.rate || 1.0);
            let newIndex = currentCharIndex + (skipSeconds * charsPerSecond);
            
            // Clamp to valid range
            newIndex = Math.max(0, Math.min(newIndex, fullText.length - 1));

            // Cancel current utterance and create new one from new position
            synth.cancel();
            currentCharIndex = newIndex;
            
            const remainingText = fullText.substring(newIndex);
            utterance = new SpeechSynthesisUtterance(remainingText);
            utterance.rate = 1.0;
            
            // Reattach event listeners
            attachUtteranceListeners();
            
            synth.speak(utterance);
            isPaused = false;
            updateTimeDisplay();
        }

        // Helper function: Attach event listeners to utterance
        function attachUtteranceListeners() {
            utterance.onstart = () => {
                isPlaying = true;
                isPaused = false;
                startTime = Date.now();
                if (!updateInterval) {
                    updateInterval = setInterval(updateTimeDisplay, 100);
                }
                pauseBtn.disabled = false;
                updateSkipButtonStates();
            };

            utterance.onend = () => {
                isPlaying = false;
                isPaused = false;
                if (updateInterval) {
                    clearInterval(updateInterval);
                    updateInterval = null;
                }
                pauseBtn.disabled = true;
                updateSkipButtonStates();
                statusBox.textContent = "Finished reading!";
            };

            utterance.onpause = () => {
                isPaused = true;
                if (updateInterval) {
                    clearInterval(updateInterval);
                    updateInterval = null;
                }
                updateSkipButtonStates();
            };

            utterance.onresume = () => {
                isPaused = false;
                startTime = Date.now() - (elapsedSeconds * 1000);
                if (!updateInterval) {
                    updateInterval = setInterval(updateTimeDisplay, 100);
                }
                updateSkipButtonStates();
            };
        }

        // Helper function: Update time display
        function updateTimeDisplay() {
            if (isPlaying && !isPaused) {
                elapsedSeconds = (Date.now() - startTime) / 1000;
            }
            const totalSeconds = estimateTotalDuration();
            timeDisplay.textContent = `${formatTime(elapsedSeconds)} / ${formatTime(totalSeconds)}`;
        }

        // Helper function: Update skip button states
        function updateSkipButtonStates() {
            const canSkip = isPlaying || isPaused;
            rewind30Btn.disabled = !canSkip;
            rewind10Btn.disabled = !canSkip;
            forward10Btn.disabled = !canSkip;
            forward30Btn.disabled = !canSkip;
        }

        // 1. Handle PDF Upload & Extract Text Locally
        uploadInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            fileNameDisplay.textContent = file.name;
            statusBox.textContent = "Extracting text from PDF... (this might take a moment depending on the book length)";
            playBtn.disabled = true;

            try {
                // Read file into laptop memory
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                fullText = "";

                // Loop through pages and extract text
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(" ");
                    fullText += pageText + " \n";
                    
                    // Update UI every 10 pages so the browser doesn't freeze
                    if (i % 10 === 0) {
                        statusBox.textContent = `Extracting: Page ${i} of ${pdf.numPages}...`;
                    }
                }

                estimatedTotalSeconds = estimateTotalDuration();
                statusBox.textContent = "Extraction complete! Ready to read.\n\nPreview:\n" + fullText.substring(0, 300) + "...";
                timeDisplay.textContent = `00:00 / ${formatTime(estimatedTotalSeconds)}`;
                playBtn.disabled = false;
                stopBtn.disabled = false;

            } catch (error) {
                statusBox.textContent = "Error reading PDF: " + error.message;
            }
        });

        // 2. Play Audio using Browser's built-in offline voices
        playBtn.addEventListener('click', () => {
            if (synth.paused) {
                synth.resume();
                statusBox.textContent = "Reading resumed...";
            } else if (!isPlaying) {
                synth.cancel(); // Stop any previous speech
                currentCharIndex = 0;
                elapsedSeconds = 0;
                utterance = new SpeechSynthesisUtterance(fullText);
                
                // You can change the speed here (1.0 is normal, 1.5 is fast)
                utterance.rate = 1.0; 
                
                attachUtteranceListeners();
                synth.speak(utterance);
                statusBox.textContent = "Reading out loud...";
            }
            pauseBtn.disabled = false;
        });

        // 3. Pause Audio
        pauseBtn.addEventListener('click', () => {
            if (synth.speaking && !synth.paused) {
                synth.pause();
                statusBox.textContent = `Reading paused. (${formatTime(elapsedSeconds)})`;
            }
        });

        // 4. Stop Audio
        stopBtn.addEventListener('click', () => {
            synth.cancel();
            isPlaying = false;
            isPaused = false;
            currentCharIndex = 0;
            elapsedSeconds = 0;
            if (updateInterval) {
                clearInterval(updateInterval);
                updateInterval = null;
            }
            statusBox.textContent = "Reading stopped.";
            timeDisplay.textContent = `00:00 / ${formatTime(estimatedTotalSeconds)}`;
            pauseBtn.disabled = true;
            updateSkipButtonStates();
        });

        // 5. Skip Forward 10 seconds
        forward10Btn.addEventListener('click', () => {
            seekBySeconds(10);
            statusBox.textContent = "Skipped forward 10 seconds...";
        });

        // 6. Skip Forward 30 seconds
        forward30Btn.addEventListener('click', () => {
            seekBySeconds(30);
            statusBox.textContent = "Skipped forward 30 seconds...";
        });

        // 7. Rewind 10 seconds
        rewind10Btn.addEventListener('click', () => {
            seekBySeconds(-10);
            statusBox.textContent = "Rewound 10 seconds...";
        });

        // 8. Rewind 30 seconds
        rewind30Btn.addEventListener('click', () => {
            seekBySeconds(-30);
            statusBox.textContent = "Rewound 30 seconds...";
        });
    </script>
</body>
</html>
